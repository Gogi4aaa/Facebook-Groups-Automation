<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FB Group Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0a;
    --surface:  #111111;
    --border:   #1e1e1e;
    --border2:  #2a2a2a;
    --text:     #e8e6e0;
    --muted:    #5a5856;
    --accent:   #1877f2;
    --accent2:  #e8b84b;
    --green:    #3ecf8e;
    --red:      #e55353;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--accent2);
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .stats {
    display: flex;
    gap: 24px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  .stats span { color: var(--text); }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 10px;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-wrap: wrap;
    align-items: center;
  }

  input[type="text"] {
    flex: 1;
    min-width: 200px;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 6px;
    font-family: var(--sans);
    font-size: 13px;
    outline: none;
    transition: border-color .2s;
  }

  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  select {
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 6px;
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    outline: none;
  }

  .filter-btn {
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--muted);
    font-size: 12px;
    font-family: var(--mono);
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--text);
    background: rgba(24,119,242,0.1);
  }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: calc(100vh - 113px);
  }

  /* ── Sidebar ── */
  aside {
    border-right: 1px solid var(--border);
    padding: 20px 0;
  }

  .sidebar-title {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0 20px 12px;
  }

  .group-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 20px;
    cursor: pointer;
    transition: background .15s;
    border-left: 2px solid transparent;
    font-size: 13px;
    color: var(--muted);
  }

  .group-item:hover { background: var(--surface); color: var(--text); }
  .group-item.active {
    background: rgba(24,119,242,0.08);
    border-left-color: var(--accent);
    color: var(--text);
  }

  .group-count {
    font-family: var(--mono);
    font-size: 11px;
    background: var(--border2);
    padding: 2px 7px;
    border-radius: 10px;
  }

  /* ── Posts list ── */
  main {
    padding: 0;
    overflow-y: auto;
  }

  .posts-list { padding-bottom: 40px; }

  .post-card {
    border-bottom: 1px solid var(--border);
    padding: 18px 28px;
    transition: background .15s;
    cursor: pointer;
    position: relative;
  }

  .post-card:hover { background: var(--surface); }
  .post-card.unseen { border-left: 3px solid var(--accent); padding-left: 25px; }
  .post-card.seen { opacity: 0.55; }

  .post-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  .author-name {
    font-weight: 500;
    color: var(--text);
    font-size: 13px;
  }

  .author-name a { color: inherit; text-decoration: none; }
  .author-name a:hover { color: var(--accent); }

  .post-group {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    background: var(--border);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .post-date {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }

  .post-text {
    font-size: 13px;
    line-height: 1.7;
    color: #b8b4ae;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .post-text.expanded {
    -webkit-line-clamp: unset;
    display: block;
  }

  .post-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    opacity: 0;
    transition: opacity .2s;
  }

  .post-card:hover .post-actions { opacity: 1; }

  .btn-sm {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
  }

  .btn-sm:hover { background: var(--surface); color: var(--text); border-color: var(--muted); }
  .btn-sm.open { border-color: var(--accent); color: var(--accent); }
  .btn-sm.open:hover { background: rgba(24,119,242,0.1); }
  .btn-sm.del { border-color: var(--border2); }
  .btn-sm.del:hover { border-color: var(--red); color: var(--red); }

  /* ── Empty / Loading ── */
  .empty {
    text-align: center;
    padding: 80px 40px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 2;
  }

  .empty strong { display: block; font-size: 15px; color: var(--text); margin-bottom: 8px; }

  /* ── Pagination ── */
  .pagination {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 24px;
  }

  .page-btn {
    font-family: var(--mono);
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 5px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
  }

  .page-btn:hover, .page-btn.active { border-color: var(--accent); color: var(--text); }
  .page-btn:disabled { opacity: 0.3; cursor: default; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-family: var(--mono);
    transform: translateY(60px);
    opacity: 0;
    transition: all .3s;
    z-index: 999;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
</style>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1877f2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FB Monitor">
  <link rel="apple-touch-icon" href="/icon-192.png">
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-dot"></span>
    FB GROUP MONITOR
  </div>
  <div class="stats" id="stats">
    <div>Общо: <span id="stat-total">—</span></div>
    <div>Нови: <span id="stat-unseen">—</span></div>
    <div>Групи: <span id="stat-groups">—</span></div>
  </div>
</header>

<div class="controls">
  <input type="text" id="search" placeholder="Търси в постове или автори..." oninput="debounceSearch()">
  <button class="filter-btn active" id="btn-all"    onclick="setFilter('all')">Всички</button>
  <button class="filter-btn"        id="btn-unseen" onclick="setFilter('unseen')">Непрегледани</button>
  <button class="filter-btn"        id="btn-seen"   onclick="setFilter('seen')">Прегледани</button>
  <button class="filter-btn" onclick="markAllSeen()" style="margin-left:auto">✓ Маркирай всички</button>
</div>

<div class="layout">
  <aside>
    <div class="sidebar-title">Групи</div>
    <div id="groups-list"></div>
  </aside>
  <main>
    <div class="posts-list" id="posts-list"></div>
    <div class="pagination" id="pagination"></div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://facebook-groups-automation-production.up.railway.app/api';
let currentPage = 1;
let currentGroup = null;
let currentFilter = 'all';
let searchTimeout = null;

// ── Fetch & render ──────────────────────────────────────────

async function loadPosts() {
  const q = document.getElementById('search').value.trim();
  const params = new URLSearchParams({ page: currentPage, limit: 50 });
  if (q) params.set('q', q);
  if (currentGroup) params.set('group', currentGroup);
  if (currentFilter === 'unseen') params.set('seen', 'false');
  if (currentFilter === 'seen')   params.set('seen', 'true');

  const res = await fetch(`${API}/posts?${params}`).catch(() => null);
  if (!res) return showEmpty('⚠️ Сървърът не е достъпен', 'Пусни: cd server && npm start');

  const data = await res.json();
  renderPosts(data.posts);
  renderPagination(data.total, data.page);
  loadStatus();
}

function renderPosts(posts) {
  const el = document.getElementById('posts-list');
  if (!posts.length) { showEmpty('Няма постове', 'Отвори Facebook група и scroll-вай'); return; }

  el.innerHTML = posts.map(p => `
    <div class="post-card ${p.seen ? 'seen' : 'unseen'}" id="post-${p.id}">
      <div class="post-meta">
        <span class="author-name">
          ${p.author_url
            ? `<a href="${p.author_url}" target="_blank">${esc(p.author_name)}</a>`
            : esc(p.author_name)}
        </span>
        <span class="post-group">${esc(p.group_name)}</span>
        <span class="post-date">${formatDate(p.captured_at)}</span>
      </div>
      <div class="post-text" id="text-${p.id}">${esc(p.text)}</div>
      <div class="post-actions">
        ${p.post_url ? `<button class="btn-sm open" onclick="openPost('${p.post_url}')">↗ Отвори</button>` : ''}
        <button class="btn-sm" onclick="toggleExpand(${p.id})">± Разгъни</button>
        <button class="btn-sm" onclick="toggleSeen(${p.id}, ${p.seen})">${p.seen ? '↺ Нов' : '✓ Прегледан'}</button>
        <button class="btn-sm del" onclick="deletePost(${p.id})">✕</button>
      </div>
    </div>
  `).join('');
}

function showEmpty(title, sub) {
  document.getElementById('posts-list').innerHTML =
    `<div class="empty"><strong>${title}</strong>${sub}</div>`;
  document.getElementById('pagination').innerHTML = '';
}

function renderPagination(total, page) {
  const pages = Math.ceil(total / 50);
  if (pages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  const el = document.getElementById('pagination');
  let html = `<button class="page-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>← Назад</button>`;
  for (let i = Math.max(1,page-2); i <= Math.min(pages,page+2); i++) {
    html += `<button class="page-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  html += `<button class="page-btn" onclick="goPage(${page+1})" ${page===pages?'disabled':''}>Напред →</button>`;
  el.innerHTML = html;
}

async function loadGroups() {
  const res = await fetch(`${API}/groups`).catch(() => null);
  if (!res) return;
  const groups = await res.json();
  const el = document.getElementById('groups-list');

  document.getElementById('stat-groups').textContent = groups.length;

  let html = `<div class="group-item ${!currentGroup?'active':''}" onclick="selectGroup(null)">
    <span>Всички групи</span>
  </div>`;
  html += groups.map(g => `
    <div class="group-item ${currentGroup===g.group_name?'active':''}" onclick="selectGroup('${esc(g.group_name).replace(/'/g,"\\'")}')">
      <span>${esc(g.group_name)}</span>
      <span class="group-count">${g.count}</span>
    </div>
  `).join('');
  el.innerHTML = html;
}

async function loadStatus() {
  const res = await fetch(`${API}/status`).catch(() => null);
  if (!res) return;
  const d = await res.json();
  document.getElementById('stat-total').textContent  = d.total;
  document.getElementById('stat-unseen').textContent = d.unseen;
}

// ── Actions ─────────────────────────────────────────────────

async function toggleSeen(id, currentSeen) {
  await fetch(`${API}/posts/${id}/seen`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ seen: !currentSeen })
  });
  loadPosts();
  loadGroups();
}

async function deletePost(id) {
  await fetch(`${API}/posts/${id}`, { method: 'DELETE' });
  document.getElementById(`post-${id}`)?.remove();
  showToast('Изтрит');
  loadStatus();
}

async function markAllSeen() {
  const res = await fetch(`${API}/posts?limit=1000&seen=false`).catch(()=>null);
  if (!res) return;
  const { posts } = await res.json();
  await Promise.all(posts.map(p =>
    fetch(`${API}/posts/${p.id}/seen`, {
      method: 'PATCH', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ seen: true })
    })
  ));
  loadPosts(); loadGroups();
  showToast(`${posts.length} поста маркирани`);
}

function openPost(url) { window.open(url, '_blank'); }

function toggleExpand(id) {
  document.getElementById(`text-${id}`)?.classList.toggle('expanded');
}

function selectGroup(name) {
  currentGroup = name;
  currentPage = 1;
  loadGroups();
  loadPosts();
}

function setFilter(f) {
  currentFilter = f;
  currentPage = 1;
  ['all','unseen','seen'].forEach(x =>
    document.getElementById(`btn-${x}`).classList.toggle('active', x === f));
  loadPosts();
}

function goPage(p) {
  currentPage = p;
  loadPosts();
  window.scrollTo(0, 0);
}

function debounceSearch() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => { currentPage = 1; loadPosts(); }, 300);
}

// ── Helpers ──────────────────────────────────────────────────

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60)   return 'преди малко';
  if (diff < 3600) return `${Math.floor(diff/60)} мин.`;
  if (diff < 86400) return `${Math.floor(diff/3600)} ч.`;
  return d.toLocaleDateString('bg-BG', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}


// ── PWA & Push нотификации ────────────────────────────────────
async function initPush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;

  try {
    const reg = await navigator.serviceWorker.register('/sw.js');
    console.log('[PWA] Service Worker регистриран');

    // Вземи VAPID публичния ключ
    const vRes = await fetch('/api/vapid-public');
    const { publicKey } = await vRes.json();

    // Провери дали вече е абониран
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      // Поискай разрешение
      const perm = await Notification.requestPermission();
      if (perm !== 'granted') return;

      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(publicKey)
      });

      await fetch('/api/push/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(sub)
      });
      console.log('[Push] Абониран за нотификации');
      showToast('Push нотификациите са активни!');
    }
  } catch(e) {
    console.warn('[Push] Грешка:', e);
  }
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = window.atob(base64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

// ── Auto-refresh ─────────────────────────────────────────────
function init() {
  loadPosts();
  loadGroups();
  // SSE — получава нови постове веднага
  const evtSource = new EventSource("https://facebook-groups-automation-production.up.railway.app/api/live");
  evtSource.onmessage = (e) => {
    const post = JSON.parse(e.data);
    loadPosts();
    loadGroups();
    loadStatus();
    if (document.hidden) {
      document.title = "● Нов пост! — FB Monitor";
      setTimeout(() => document.title = "FB Group Monitor", 5000);
    }
  };
}

init();
initPush();
</script>
</body>
</html>
