<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#080808">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="FB Monitor">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>FB Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #080808;
  --bg2:       #101010;
  --bg3:       #161616;
  --bg4:       #1c1c1c;
  --border:    #222;
  --border2:   #2c2c2c;
  --text:      #f0ede8;
  --text2:     #888580;
  --text3:     #4a4845;
  --accent:    #1877f2;
  --accent2:   #e8b84b;
  --green:     #3ecf8e;
  --red:       #e05252;
  --mono:      'Geist Mono', monospace;
  --sans:      'Instrument Sans', sans-serif;
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%; background: var(--bg);
  color: var(--text); font-family: var(--sans);
  font-size: 15px; line-height: 1.5;
  overscroll-behavior: none;
}

.app {
  display: flex; flex-direction: column;
  height: 100vh; height: 100dvh;
  padding-top: var(--safe-top);
}

/* Header */
.header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
}
.header-logo {
  font-family: var(--mono); font-size: 12px; font-weight: 600;
  color: var(--accent2); letter-spacing: 0.08em;
  display: flex; align-items: center; gap: 7px;
}
.pulse-dot {
  width: 6px; height: 6px; background: var(--green);
  border-radius: 50%; flex-shrink: 0;
  animation: pulse 2.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.8)} }
.header-stats { margin-left: auto; }
.stat-badge {
  font-family: var(--mono); font-size: 11px;
  background: var(--bg3); color: var(--text2);
  padding: 4px 10px; border-radius: 20px;
  border: 1px solid var(--border);
}
.stat-badge.has-new { background: rgba(24,119,242,0.12); color: var(--accent); border-color: rgba(24,119,242,0.3); }

/* Toolbar */
.toolbar {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg); flex-shrink: 0;
  display: flex; flex-direction: column; gap: 8px;
}
.search-wrap { position: relative; }
.search-icon {
  position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
  color: var(--text3); font-size: 16px; pointer-events: none;
}
.search-input {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); padding: 10px 14px 10px 40px;
  border-radius: 10px; font-family: var(--sans); font-size: 15px;
  outline: none; transition: border-color .2s; -webkit-appearance: none;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text3); }
.filter-row {
  display: flex; gap: 6px; overflow-x: auto;
  scrollbar-width: none; -webkit-overflow-scrolling: touch;
}
.filter-row::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0; padding: 7px 16px;
  border-radius: 20px; border: 1px solid var(--border);
  background: var(--bg3); color: var(--text2);
  font-size: 13px; font-family: var(--mono);
  cursor: pointer; transition: all .15s; white-space: nowrap;
  -webkit-appearance: none;
}
.chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.chip:active { opacity: .7; }

/* Mark all bar */
.mark-all-bar {
  padding: 8px 14px; border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.mark-all-btn {
  width: 100%; padding: 10px;
  background: var(--bg3); border: 1px solid var(--border2);
  color: var(--text2); border-radius: 10px;
  font-family: var(--mono); font-size: 12px; cursor: pointer;
  transition: all .15s; -webkit-appearance: none;
}
.mark-all-btn:active { background: var(--bg4); }

/* Content */
.content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
.view { display: none; }
.view.active { display: block; }

/* Post cards */
.posts-wrap { padding-bottom: 20px; }
.post-card {
  padding: 16px 18px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .1s;
  -webkit-user-select: none; user-select: none;
}
.post-card:active { background: var(--bg2); }
.post-card.unseen { border-left: 3px solid var(--accent); padding-left: 15px; }
.post-card.seen { opacity: .5; }
.post-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
.post-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--bg4); border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 14px; font-weight: 600;
  color: var(--accent2); flex-shrink: 0;
}
.post-meta { flex: 1; min-width: 0; }
.post-author { font-weight: 600; font-size: 14px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.post-info { display: flex; align-items: center; gap: 6px; margin-top: 3px; flex-wrap: wrap; }
.post-group {
  font-family: var(--mono); font-size: 10px; color: var(--text3);
  background: var(--bg3); padding: 2px 7px; border-radius: 4px;
  border: 1px solid var(--border); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; max-width: 160px;
}
.post-time { font-family: var(--mono); font-size: 11px; color: var(--text3); }
.post-text {
  font-size: 14px; color: #c0bcb6; line-height: 1.65;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}

/* Groups */
.groups-wrap { padding: 8px 0; }
.group-item {
  display: flex; align-items: center;
  padding: 15px 18px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .1s; gap: 12px;
}
.group-item:active { background: var(--bg2); }
.group-item.active-filter { background: rgba(24,119,242,.06); border-left: 3px solid var(--accent); padding-left: 15px; }
.group-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.group-item-name { flex: 1; font-size: 15px; font-weight: 500; }
.group-count {
  font-family: var(--mono); font-size: 11px;
  background: var(--bg3); color: var(--text2);
  padding: 3px 10px; border-radius: 10px; border: 1px solid var(--border);
}

/* Empty */
.empty { padding: 60px 32px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 12px; }
.empty-icon { font-size: 36px; opacity: .25; }
.empty-title { font-size: 16px; font-weight: 600; color: var(--text2); }
.empty-sub { font-size: 13px; color: var(--text3); line-height: 1.7; }

/* Pagination */
.pagination { display: flex; justify-content: center; align-items: center; gap: 10px; padding: 20px 18px; }
.page-btn {
  padding: 11px 20px; border-radius: 10px;
  border: 1px solid var(--border2); background: var(--bg3);
  color: var(--text2); font-family: var(--mono); font-size: 14px;
  cursor: pointer; transition: all .15s; -webkit-appearance: none;
  min-width: 48px; min-height: 44px;
}
.page-btn:active { opacity: .7; }
.page-btn:disabled { opacity: .25; pointer-events: none; }
.page-info { font-family: var(--mono); font-size: 12px; color: var(--text3); }

/* Bottom nav */
.bottom-nav {
  display: flex; background: var(--bg);
  border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bottom); flex-shrink: 0;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 10px 8px 8px; gap: 4px;
  background: none; border: none; cursor: pointer;
  color: var(--text3); transition: color .15s;
  -webkit-appearance: none; position: relative;
  min-height: 56px;
}
.nav-btn.active { color: var(--accent); }
.nav-btn:active { opacity: .6; }
.nav-icon { font-size: 22px; line-height: 1; }
.nav-label { font-family: var(--mono); font-size: 10px; letter-spacing: .05em; }
.nav-badge {
  position: absolute; top: 6px; right: calc(50% - 18px);
  background: var(--red); color: white;
  font-family: var(--mono); font-size: 9px; font-weight: 600;
  padding: 2px 5px; border-radius: 8px; min-width: 17px;
  text-align: center; display: none; line-height: 1.4;
}
.nav-badge.show { display: block; }
@keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.4)} 100%{transform:scale(1)} }
.nav-badge.pop { animation: pop .3s ease; }

/* Sheet */
.sheet-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.65);
  z-index: 200; opacity: 0; pointer-events: none; transition: opacity .25s;
}
.sheet-overlay.open { opacity: 1; pointer-events: all; }
.sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg2); border-radius: 20px 20px 0 0;
  z-index: 201; transform: translateY(100%);
  transition: transform .3s cubic-bezier(.32,.72,0,1);
  max-height: 88dvh; display: flex; flex-direction: column;
  padding-bottom: var(--safe-bottom);
}
.sheet.open { transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 12px auto 0; flex-shrink: 0; }
.sheet-header { padding: 16px 20px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sheet-author { font-size: 17px; font-weight: 600; margin-bottom: 5px; }
.sheet-meta { font-family: var(--mono); font-size: 11px; color: var(--text2); }
.sheet-body { flex: 1; overflow-y: auto; padding: 18px 20px; }
.sheet-text { font-size: 15px; line-height: 1.8; color: #c8c4bc; }
.sheet-actions {
  display: flex; gap: 10px; padding: 14px 20px;
  border-top: 1px solid var(--border); flex-shrink: 0;
}
.sheet-btn {
  flex: 1; padding: 14px 8px; border-radius: 12px;
  border: none; font-size: 14px; font-family: var(--sans);
  font-weight: 500; cursor: pointer; transition: all .15s;
  -webkit-appearance: none; min-height: 48px;
}
.sheet-btn:active { transform: scale(.97); opacity: .8; }
.sheet-btn.open-fb { background: var(--accent); color: white; }
.sheet-btn.mark-seen { background: var(--bg3); color: var(--text2); border: 1px solid var(--border2); }
.sheet-btn.delete-post { background: rgba(224,82,82,.1); color: var(--red); border: 1px solid rgba(224,82,82,.2); max-width: 52px; }

/* Toast */
.toast {
  position: fixed; bottom: calc(72px + var(--safe-bottom)); left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--bg3); border: 1px solid var(--border2);
  color: var(--text); padding: 10px 20px; border-radius: 20px;
  font-size: 13px; font-family: var(--mono);
  opacity: 0; transition: all .3s; z-index: 999;
  white-space: nowrap; pointer-events: none;
  box-shadow: 0 4px 24px rgba(0,0,0,.6);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (min-width: 768px) {
  .app { max-width: 680px; margin: 0 auto; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
  .post-card:hover { background: var(--bg2); }
  .group-item:hover { background: var(--bg2); }
}
</style>
</head>
<body>
<div class="app">

  <header class="header">
    <div class="header-logo">
      <span class="pulse-dot"></span>
      FB MONITOR
    </div>
    <div class="header-stats">
      <span class="stat-badge" id="stat-badge">зарежда...</span>
    </div>
  </header>

  <div class="toolbar" id="toolbar-feed">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="search-input" id="search" type="search" placeholder="Търси постове или автори...">
    </div>
    <div class="filter-row">
      <button class="chip active" data-filter="all">Всички</button>
      <button class="chip" data-filter="unseen">Нови</button>
      <button class="chip" data-filter="seen">Прегледани</button>
    </div>
  </div>

  <div class="mark-all-bar" id="mark-all-bar" style="display:none">
    <button class="mark-all-btn" id="btn-mark-all">✓ Маркирай всички като прегледани</button>
  </div>

  <div class="content">
    <div class="view active" id="view-feed">
      <div class="posts-wrap" id="posts-list"></div>
      <div class="pagination" id="pagination"></div>
    </div>
    <div class="view" id="view-groups">
      <div class="groups-wrap" id="groups-list"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="feed">
      <span class="nav-badge" id="nav-badge">0</span>
      <span class="nav-icon">◈</span>
      <span class="nav-label">FEED</span>
    </button>
    <button class="nav-btn" data-view="groups">
      <span class="nav-icon">◎</span>
      <span class="nav-label">ГРУПИ</span>
    </button>
  </nav>
</div>

<div class="sheet-overlay" id="sheet-overlay"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-author" id="sheet-author"></div>
    <div class="sheet-meta" id="sheet-meta"></div>
  </div>
  <div class="sheet-body">
    <div class="sheet-text" id="sheet-text"></div>
  </div>
  <div class="sheet-actions">
    <button class="sheet-btn open-fb" id="sheet-open">↗ Отвори във FB</button>
    <button class="sheet-btn mark-seen" id="sheet-seen">✓ Прегледан</button>
    <button class="sheet-btn delete-post" id="sheet-delete">✕</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://facebook-groups-automation-production.up.railway.app/api';
const COLORS = ['#1877f2','#3ecf8e','#e8b84b','#e05252','#a78bfa','#f97316','#06b6d4','#ec4899'];

let currentPage = 1, currentFilter = 'all', currentGroup = null;
let searchTimeout = null, currentPost = null, allGroups = [];

async function loadPosts() {
  const q = document.getElementById('search').value.trim();
  const p = new URLSearchParams({ page: currentPage, limit: 30 });
  if (q) p.set('q', q);
  if (currentGroup) p.set('group', currentGroup);
  if (currentFilter === 'unseen') p.set('seen', 'false');
  if (currentFilter === 'seen') p.set('seen', 'true');

  const res = await fetch(`${API}/posts?${p}`).catch(() => null);
  if (!res) { renderEmpty('posts-list', '⚠', 'Сървърът не отговаря', ''); return; }
  const data = await res.json();
  renderPosts(data.posts);
  renderPagination(data.total, data.page);
  const bar = document.getElementById('mark-all-bar');
  const activeView = document.getElementById('view-feed').classList.contains('active');
  bar.style.display = (activeView && currentFilter !== 'seen' && data.posts.some(p => !p.seen)) ? 'block' : 'none';
}

async function loadGroups() {
  const res = await fetch(`${API}/groups`).catch(() => null);
  if (!res) return;
  allGroups = await res.json();
  renderGroups();
}

async function loadStatus() {
  const res = await fetch(`${API}/status`).catch(() => null);
  if (!res) return;
  const d = await res.json();
  const badge = document.getElementById('stat-badge');
  badge.textContent = d.unseen > 0 ? `${d.unseen} нови · ${d.total}` : `${d.total} поста`;
  badge.className = d.unseen > 0 ? 'stat-badge has-new' : 'stat-badge';
  const nb = document.getElementById('nav-badge');
  if (d.unseen > 0) { nb.textContent = d.unseen > 99 ? '99+' : d.unseen; nb.classList.add('show'); }
  else nb.classList.remove('show');
}

function renderPosts(posts) {
  const el = document.getElementById('posts-list');
  if (!posts.length) {
    renderEmpty('posts-list', '◌', 'Няма постове',
      currentFilter === 'unseen' ? 'Всичко е прегледано!' : 'Отвори Facebook групи в Chrome.');
    return;
  }
  el.innerHTML = posts.map(p => `
    <div class="post-card ${p.seen ? 'seen' : 'unseen'}" data-post='${JSON.stringify(p).replace(/'/g,"&#39;")}'>
      <div class="post-header">
        <div class="post-avatar">${(p.author_name||'?')[0].toUpperCase()}</div>
        <div class="post-meta">
          <div class="post-author">${esc(p.author_name)}</div>
          <div class="post-info">
            <span class="post-group">${esc(p.group_name)}</span>
            <span class="post-time">${timeAgo(p.captured_at)}</span>
          </div>
        </div>
      </div>
      <div class="post-text">${esc(p.text)}</div>
    </div>
  `).join('');
  el.querySelectorAll('.post-card').forEach(card => {
    card.addEventListener('click', () => openSheet(JSON.parse(card.dataset.post.replace(/&#39;/g,"'"))));
  });
}

function renderGroups() {
  const el = document.getElementById('groups-list');
  if (!allGroups.length) {
    renderEmpty('groups-list', '◎', 'Няма групи', 'Отвори Facebook групи в Chrome и\nExtension-ът ще ги добави автоматично.');
    return;
  }
  const total = allGroups.reduce((s,g) => s + g.count, 0);
  const all = `<div class="group-item ${!currentGroup?'active-filter':''}" data-group=""><div class="group-dot" style="background:#888"></div><div class="group-item-name">Всички групи</div><span class="group-count">${total}</span></div>`;
  const items = allGroups.map((g,i) => `<div class="group-item ${currentGroup===g.group_name?'active-filter':''}" data-group="${esc(g.group_name)}"><div class="group-dot" style="background:${COLORS[i%COLORS.length]}"></div><div class="group-item-name">${esc(g.group_name)}</div><span class="group-count">${g.count}</span></div>`).join('');
  el.innerHTML = all + items;
  el.querySelectorAll('.group-item').forEach(item => {
    item.addEventListener('click', () => {
      currentGroup = item.dataset.group || null;
      currentPage = 1;
      switchView('feed');
      loadGroups(); loadPosts();
    });
  });
}

function renderPagination(total, page) {
  const pages = Math.ceil(total / 30);
  const el = document.getElementById('pagination');
  if (pages <= 1) { el.innerHTML = ''; return; }
  el.innerHTML = `<button class="page-btn" id="pg-prev" ${page===1?'disabled':''}>←</button><span class="page-info">${page} / ${pages}</span><button class="page-btn" id="pg-next" ${page===pages?'disabled':''}>→</button>`;
  document.getElementById('pg-prev')?.addEventListener('click', () => { currentPage--; loadPosts(); document.querySelector('.content').scrollTo({top:0,behavior:'smooth'}); });
  document.getElementById('pg-next')?.addEventListener('click', () => { currentPage++; loadPosts(); document.querySelector('.content').scrollTo({top:0,behavior:'smooth'}); });
}

function renderEmpty(elId, icon, title, sub) {
  document.getElementById(elId).innerHTML = `<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-title">${title}</div><div class="empty-sub">${sub}</div></div>`;
  if (elId === 'posts-list') document.getElementById('pagination').innerHTML = '';
}

function openSheet(post) {
  currentPost = post;
  document.getElementById('sheet-author').textContent = post.author_name;
  document.getElementById('sheet-meta').textContent = `${post.group_name} · ${timeAgo(post.captured_at)}`;
  document.getElementById('sheet-text').textContent = post.text;
  document.getElementById('sheet-seen').textContent = post.seen ? '↺ Нов' : '✓ Прегледан';
  document.getElementById('sheet-overlay').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  if (!post.seen) { toggleSeen(post.id, false); post.seen = 1; loadStatus(); }
}

function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  currentPost = null;
  loadPosts(); loadStatus();
}

async function toggleSeen(id, currentSeen) {
  await fetch(`${API}/posts/${id}/seen`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({seen:!currentSeen}) });
}

async function deletePost(id) {
  await fetch(`${API}/posts/${id}`, { method:'DELETE' });
  closeSheet(); showToast('Изтрит'); loadStatus();
}

async function markAllSeen() {
  const res = await fetch(`${API}/posts?limit=200&seen=false`).catch(()=>null);
  if (!res) return;
  const { posts } = await res.json();
  await Promise.all(posts.map(p => fetch(`${API}/posts/${p.id}/seen`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({seen:true}) })));
  loadPosts(); loadStatus(); showToast(`${posts.length} поста маркирани`);
}

function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`view-${name}`).classList.add('active');
  document.querySelector(`[data-view="${name}"]`).classList.add('active');
  const toolbar = document.getElementById('toolbar-feed');
  const markBar = document.getElementById('mark-all-bar');
  toolbar.style.display = name === 'feed' ? '' : 'none';
  markBar.style.display = 'none';
  if (name === 'feed') loadPosts();
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function timeAgo(iso) {
  if (!iso) return '';
  const diff = (Date.now() - new Date(iso)) / 1000;
  if (diff < 60) return 'току-що';
  if (diff < 3600) return `${Math.floor(diff/60)}м`;
  if (diff < 86400) return `${Math.floor(diff/3600)}ч`;
  return new Date(iso).toLocaleDateString('bg-BG', {day:'numeric',month:'short'});
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Push & SSE
async function initPush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  try {
    const reg = await navigator.serviceWorker.register('/sw.js');
    const { publicKey } = await fetch(`${API.replace('/api','')}/api/vapid-public`).then(r=>r.json());
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      const perm = await Notification.requestPermission();
      if (perm !== 'granted') return;
      sub = await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey: urlBase64ToUint8Array(publicKey) });
      await fetch(`${API}/push/subscribe`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(sub) });
      showToast('Push нотификациите са активни!');
    }
  } catch(e) { console.warn('[Push]', e); }
}

function urlBase64ToUint8Array(b64) {
  const pad = '='.repeat((4 - b64.length%4)%4);
  const raw = atob((b64+pad).replace(/-/g,'+').replace(/_/g,'/'));
  return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));
}

function initSSE() {
  const es = new EventSource(`${API}/live`);
  es.onmessage = () => {
    loadPosts(); loadGroups(); loadStatus();
    const nb = document.getElementById('nav-badge');
    nb.classList.add('pop');
    setTimeout(() => nb.classList.remove('pop'), 300);
  };
}

// Event listeners
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter; currentPage = 1; loadPosts();
  });
});
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    switchView(btn.dataset.view);
    if (btn.dataset.view === 'groups') loadGroups();
  });
});
document.getElementById('search').addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => { currentPage = 1; loadPosts(); }, 350);
});
document.getElementById('btn-mark-all').addEventListener('click', markAllSeen);
document.getElementById('sheet-overlay').addEventListener('click', closeSheet);
document.getElementById('sheet-open').addEventListener('click', () => { if (currentPost?.post_url) window.open(currentPost.post_url, '_blank'); });
document.getElementById('sheet-seen').addEventListener('click', async () => { if (currentPost) { await toggleSeen(currentPost.id, currentPost.seen); closeSheet(); } });
document.getElementById('sheet-delete').addEventListener('click', () => { if (currentPost) deletePost(currentPost.id); });

// Swipe down to close sheet
let ty = 0;
document.getElementById('sheet').addEventListener('touchstart', e => { ty = e.touches[0].clientY; }, {passive:true});
document.getElementById('sheet').addEventListener('touchend', e => { if (e.changedTouches[0].clientY - ty > 80) closeSheet(); }, {passive:true});

// Init
Promise.all([loadPosts(), loadGroups(), loadStatus()]).then(() => { initSSE(); initPush(); });
</script>
